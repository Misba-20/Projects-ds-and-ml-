<!DOCTYPE html>
<html>
<head>

<title>Admin Login - NutriSmart AI</title>

<link rel="stylesheet"
href="{{ url_for('static', filename='css/style.css') }}">

<style>

body{
    margin:0;
    font-family:Arial,sans-serif;
    background:linear-gradient(
        135deg,
        #0F172A,
        #1E293B,
        #312E81
    );
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.login-card{
    width:400px;
    background:rgba(255,255,255,0.08);
    backdrop-filter:blur(20px);
    border:1px solid rgba(255,255,255,0.1);
    padding:35px;
    border-radius:25px;
    box-shadow:0 8px 30px rgba(0,0,0,0.3);
}

.login-card h1{
    text-align:center;
    color:white;
    margin-bottom:25px;
}

.input-group{
    margin-bottom:15px;
}

.input-group label{
    color:white;
    display:block;
    margin-bottom:5px;
}

.input-group input{
    width:100%;
    padding:12px;
    border:none;
    outline:none;
    border-radius:12px;
    background:rgba(255,255,255,0.1);
    color:white;
}

.input-group input::placeholder{
    color:#ddd;
}

.login-btn{
    width:100%;
    padding:12px;
    border:none;
    border-radius:12px;
    cursor:pointer;
    color:white;
    font-size:16px;
    font-weight:bold;
    background:linear-gradient(
        90deg,
        #06B6D4,
        #7C3AED
    );
}

.login-btn:hover{
    transform:scale(1.03);
}

.admin-icon{
    text-align:center;
    font-size:50px;
    margin-bottom:10px;
}

</style>

</head>

<body>

<div class="login-card">

    <div class="admin-icon">
        👨‍💼
    </div>

    <h1>Admin Login</h1>

    <form method="POST">

        <div class="input-group">

            <label>Email</label>

            <input
                type="email"
                name="email"
                placeholder="Enter Admin Email"
                required>

        </div>

        <div class="input-group">

            <label>Password</label>

            <input
                type="password"
                name="password"
                placeholder="Enter Password"
                required>

        </div>

        <button
            type="submit"
            class="login-btn">

            Login

        </button>

    </form>

</div>

</body>
</html>
