<!DOCTYPE html>
<html>
<head>
<title>User Profile</title>
<link rel="stylesheet" href="{{ url_for('static',filename='css/style.css') }}">
<style>
.container { max-width: 600px; margin: 40px auto; padding: 0 20px; }
.form-card {
    background: rgba(255,255,255,0.06);
    backdrop-filter: blur(20px);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 24px;
    padding: 35px;
}
.form-card h2 {
    color: #38BDF8;
    font-size: 28px;
    font-weight: 700;
    margin-bottom: 8px;
}
.form-card .subtitle {
    color: #94A3B8;
    margin-bottom: 25px;
}
.form-group {
    margin-bottom: 20px;
}
.form-group label {
    display: block;
    color: #94A3B8;
    font-weight: 500;
    font-size: 14px;
    margin-bottom: 6px;
}
.form-group input, .form-group select {
    width: 100%;
    padding: 14px 18px;
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 14px;
    background: rgba(255,255,255,0.06);
    color: #E2E8F0;
    font-size: 15px;
    transition: all 0.3s ease;
    outline: none;
}
.form-group input:focus, .form-group select:focus {
    border-color: #38BDF8;
    background: rgba(255,255,255,0.10);
    box-shadow: 0 0 0 4px rgba(56, 189, 248, 0.08);
}
.form-group select option {
    background: #1E293B;
    color: #E2E8F0;
}
.form-actions {
    display: flex;
    gap: 15px;
    margin-top: 10px;
}
.btn-primary {
    flex: 1;
    padding: 14px;
    border: none;
    border-radius: 14px;
    cursor: pointer;
    color: white;
    font-size: 16px;
    font-weight: 600;
    background: linear-gradient(135deg, #06B6D4, #8B5CF6);
    transition: all 0.3s ease;
}
.btn-primary:hover {
    transform: translateY(-2px);
    box-shadow: 0 4px 20px rgba(6, 182, 212, 0.3);
}
.btn-secondary {
    padding: 14px 25px;
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 14px;
    cursor: pointer;
    color: #94A3B8;
    font-size: 16px;
    font-weight: 600;
    background: transparent;
    text-decoration: none;
    text-align: center;
    transition: all 0.3s ease;
}
.btn-secondary:hover {
    background: rgba(255,255,255,0.05);
    border-color: rgba(255,255,255,0.2);
}
.current-values {
    background: rgba(255,255,255,0.03);
    border-radius: 12px;
    padding: 15px;
    margin-bottom: 25px;
    border: 1px solid rgba(255,255,255,0.05);
}
.current-values h4 {
    color: #94A3B8;
    font-size: 13px;
    font-weight: 500;
    margin-bottom: 8px;
}
.current-values .value-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 5px 20px;
}
.current-values .value-item {
    display: flex;
    justify-content: space-between;
    padding: 3px 0;
}
.current-values .label { color: #64748B; font-size: 13px; }
.current-values .value { color: #38BDF8; font-size: 13px; font-weight: 500; }
</style>
</head>
<body>
<div class="container">
    <div class="form-card">
        <h2>👤 Edit Profile</h2>
        <p class="subtitle">Update your personal information</p>

        {% if profile %}
        <div class="current-values">
            <h4>📌 Current Values</h4>
            <div class="value-grid">
                <div class="value-item">
                    <span class="label">Age</span>
                    <span class="value">{{ profile.age or 'Not set' }}</span>
                </div>
                <div class="value-item">
                    <span class="label">Gender</span>
                    <span class="value">{{ profile.gender or 'Not set' }}</span>
                </div>
                <div class="value-item">
                    <span class="label">Height</span>
                    <span class="value">{{ profile.height or 'Not set' }} cm</span>
                </div>
                <div class="value-item">
                    <span class="label">Weight</span>
                    <span class="value">{{ profile.weight or 'Not set' }} kg</span>
                </div>
            </div>
        </div>
        {% endif %}

        <form method="POST">
            <div class="form-group">
                <label for="age">Age <span style="color: #EF4444;">*</span></label>
                <input type="number" id="age" name="age" 
                       value="{{ profile.age if profile else '' }}" 
                       placeholder="Enter your age" required>
            </div>

            <div class="form-group">
                <label for="gender">Gender <span style="color: #EF4444;">*</span></label>
                <select id="gender" name="gender" required>
                    <option value="">Select Gender</option>
                    <option value="Male" {% if profile and profile.gender == 'Male' %}selected{% endif %}>Male</option>
                    <option value="Female" {% if profile and profile.gender == 'Female' %}selected{% endif %}>Female</option>
                    <option value="Other" {% if profile and profile.gender == 'Other' %}selected{% endif %}>Other</option>
                </select>
            </div>

            <div class="form-group">
                <label for="height">Height (cm) <span style="color: #EF4444;">*</span></label>
                <input type="number" id="height" name="height" step="0.1"
                       value="{{ profile.height if profile else '' }}" 
                       placeholder="Enter your height in cm" required>
            </div>

            <div class="form-group">
                <label for="weight">Weight (kg) <span style="color: #EF4444;">*</span></label>
                <input type="number" id="weight" name="weight" step="0.1"
                       value="{{ profile.weight if profile else '' }}" 
                       placeholder="Enter your weight in kg" required>
            </div>

            <div class="form-actions">
                <button type="submit" class="btn-primary">💾 Save Changes</button>
                <a href="/dashboard" class="btn-secondary">Cancel</a>
            </div>
        </form>
    </div>
</div>
</body>
</html>
