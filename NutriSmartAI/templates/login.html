<!DOCTYPE html>
<html>
<head>
    <title>Login | NutriSmart AI</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <style>
        .login-container {
            max-width: 420px;
            margin: 60px auto;
            padding: 0 20px;
        }

        .login-card {
            background: rgba(255, 255, 255, 0.06);
            backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 28px;
            padding: 45px 40px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.4);
        }

        .login-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .login-header .logo-icon {
            font-size: 48px;
            display: block;
            margin-bottom: 10px;
        }

        .login-header h1 {
            font-size: 28px;
            font-weight: 700;
            background: linear-gradient(135deg, #38BDF8, #8B5CF6);
            background-clip: text;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            color: transparent;
            margin-bottom: 5px;
        }

        .login-header p {
            color: #94A3B8;
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            color: #94A3B8;
            font-size: 13px;
            font-weight: 500;
            margin-bottom: 6px;
        }

        .form-group .input-icon {
            position: relative;
        }

        .form-group .input-icon .icon {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: #64748B;
            font-size: 18px;
        }

        .form-group input {
            width: 100%;
            padding: 14px 18px 14px 48px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 14px;
            background: rgba(255, 255, 255, 0.06);
            color: #E2E8F0;
            font-size: 15px;
            outline: none;
            transition: all 0.3s ease;
            box-sizing: border-box;
        }

        .form-group input:focus {
            border-color: #38BDF8;
            background: rgba(255, 255, 255, 0.10);
            box-shadow: 0 0 0 4px rgba(56, 189, 248, 0.08);
        }

        .form-group input::placeholder {
            color: #64748B;
        }

        .form-options {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 15px 0 25px 0;
        }

        .form-options label {
            color: #94A3B8;
            font-size: 13px;
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
        }

        .form-options label input[type="checkbox"] {
            width: 16px;
            height: 16px;
            accent-color: #8B5CF6;
            cursor: pointer;
        }

        .form-options a {
            color: #38BDF8;
            text-decoration: none;
            font-size: 13px;
            transition: all 0.3s ease;
        }

        .form-options a:hover {
            color: #7DD3FC;
            text-decoration: underline;
        }

        .login-btn {
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 14px;
            cursor: pointer;
            color: white;
            font-size: 16px;
            font-weight: 600;
            background: linear-gradient(135deg, #06B6D4, #8B5CF6);
            transition: all 0.3s ease;
            box-shadow: 0 4px 20px rgba(6, 182, 212, 0.3);
        }

        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(6, 182, 212, 0.4);
        }

        .login-btn:active {
            transform: translateY(0);
        }

        .login-footer {
            text-align: center;
            margin-top: 25px;
            color: #94A3B8;
            font-size: 14px;
        }

        .login-footer a {
            color: #38BDF8;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .login-footer a:hover {
            color: #7DD3FC;
            text-decoration: underline;
        }

        .login-divider {
            display: flex;
            align-items: center;
            gap: 15px;
            margin: 20px 0;
        }

        .login-divider::before,
        .login-divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: rgba(255, 255, 255, 0.08);
        }

        .login-divider span {
            color: #64748B;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .admin-link {
            display: block;
            text-align: center;
            margin-top: 15px;
            color: #64748B;
            font-size: 13px;
            text-decoration: none;
            transition: all 0.3s ease;
        }

        .admin-link:hover {
            color: #94A3B8;
        }

        /* Flash Messages */
        .flash-message {
            padding: 14px 18px;
            border-radius: 12px;
            margin-bottom: 20px;
            font-size: 14px;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .flash-success {
            background: rgba(34, 197, 94, 0.12);
            border: 1px solid rgba(34, 197, 94, 0.2);
            color: #86EFAC;
        }

        .flash-danger {
            background: rgba(239, 68, 68, 0.12);
            border: 1px solid rgba(239, 68, 68, 0.2);
            color: #FCA5A5;
        }

        .flash-warning {
            background: rgba(234, 179, 8, 0.12);
            border: 1px solid rgba(234, 179, 8, 0.2);
            color: #FDE047;
        }

        /* Responsive */
        @media (max-width: 480px) {
            .login-container {
                margin: 30px auto;
            }

            .login-card {
                padding: 30px 25px;
            }

            .login-header h1 {
                font-size: 24px;
            }

            .form-options {
                flex-direction: column;
                gap: 10px;
                align-items: flex-start;
            }
        }
    </style>
</head>
<body>

<div class="login-container">
    <div class="login-card">
        <!-- Header -->
        <div class="login-header">
            <span class="logo-icon">🍏</span>
            <h1>NutriSmart AI</h1>
            <p>Sign in to your account</p>
        </div>

        <!-- Flash Messages -->
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="flash-message flash-{{ category }}">
                        {{ message }}
                    </div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <!-- Login Form -->
        <form method="POST">
            <div class="form-group">
                <label>Email Address</label>
                <div class="input-icon">
                    <span class="icon">📧</span>
                    <input 
                        type="email" 
                        name="email" 
                        placeholder="Enter your email"
                        required
                    >
                </div>
            </div>

            <div class="form-group">
                <label>Password</label>
                <div class="input-icon">
                    <span class="icon">🔒</span>
                    <input 
                        type="password" 
                        name="password" 
                        placeholder="Enter your password"
                        required
                    >
                </div>
            </div>

            <div class="form-options">
                <label>
                    <input type="checkbox" name="remember">
                    Remember me
                </label>
                <a href="#">Forgot password?</a>
            </div>

            <button type="submit" class="login-btn">
                Sign In 🚀
            </button>
        </form>

        <div class="login-divider">
            <span>Or</span>
        </div>

        <!-- Register Link -->
        <div class="login-footer">
            Don't have an account? <a href="/register">Create one</a>
        </div>

        <!-- Admin Link -->
        <a href="/admin-login" class="admin-link">
            👨‍💼 Admin Login
        </a>
    </div>
</div>

</body>
</html>
